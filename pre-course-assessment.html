<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Course Assessment — AI for Engineers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08111f;--line:#223655;--text:#e6edf8;--muted:#9fb0c9;--white:#fff;
  --green:#22c55e;--blue:#4ea1ff;--amber:#f59e0b;--shadow:0 16px 50px rgba(0,0,0,.35);--max:680px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;
  background:radial-gradient(circle at top left,rgba(78,161,255,.12),transparent 20%),
    radial-gradient(circle at top right,rgba(45,212,191,.08),transparent 20%),
    linear-gradient(180deg,var(--bg),#07101d 48%,#060d18 100%);
  line-height:1.75;display:flex;flex-direction:column;
}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:50;background:rgba(8,17,31,.72);backdrop-filter:blur(14px);border-bottom:1px solid rgba(34,54,85,.75);}
.nav-inner{max-width:var(--max);margin:0 auto;padding:0 24px;min-height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;}
.brand-mark{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#184f9c,#24a1ff);font-size:13px;font-weight:800;color:#fff;}
.back-pill{display:flex;align-items:center;gap:6px;font-size:.84rem;color:var(--muted);padding:5px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.07);transition:.15s;}
.back-pill:hover{color:var(--white);border-color:rgba(255,255,255,.15)}
.back-pill svg{width:13px;height:13px;flex-shrink:0}

/* HERO */
.hero{max-width:var(--max);margin:0 auto;width:100%;padding:48px 24px 0;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border:1px solid rgba(34,197,94,.22);border-radius:999px;background:rgba(34,197,94,.07);color:#86efac;font-size:.85rem;font-weight:700;margin-bottom:16px;}
.tag-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.9rem,5vw,2.8rem);line-height:1.05;letter-spacing:-.04em;margin-bottom:10px;}
.hero h1 span{color:#4ade80}
.hero p{color:var(--muted);font-size:.97rem;max-width:540px;margin-bottom:28px;line-height:1.7;}
.info-row{display:flex;gap:0;border:1px solid rgba(34,197,94,.15);border-radius:14px;overflow:hidden;background:rgba(13,25,46,.6);margin-bottom:36px;max-width:420px;}
.info-item{flex:1;padding:12px 16px;border-right:1px solid rgba(34,197,94,.1);}
.info-item:last-child{border-right:none}
.info-n{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;color:#fff;line-height:1;}
.info-l{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* QUIZ SHELL */
.quiz-shell{max-width:var(--max);margin:0 auto;width:100%;padding:0 24px 60px;flex:1;}

/* PROGRESS */
.prog-wrap{margin-bottom:24px;}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;}
.prog-track{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:99px;transition:width .4s ease;}

/* QUESTION CARD */
.q-card{background:linear-gradient(180deg,rgba(14,27,48,.96),rgba(9,17,31,.9));border:1px solid rgba(43,64,98,.82);border-radius:22px;padding:26px;box-shadow:var(--shadow);}
.q-cat{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#8ec5ff;padding:4px 10px;background:rgba(78,161,255,.08);border:1px solid rgba(78,161,255,.15);border-radius:999px;margin-bottom:14px;}
.q-text{font-size:1.05rem;color:#fff;line-height:1.6;margin-bottom:20px;font-weight:500;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  text-align:left;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:14px;
  padding:12px 16px;font-size:.93rem;color:#d6e1f0;cursor:pointer;
  transition:all .15s;line-height:1.55;font-family:'Inter',system-ui,sans-serif;
  display:flex;align-items:flex-start;gap:12px;
}
.opt:hover:not(:disabled){background:rgba(78,161,255,.07);border-color:rgba(78,161,255,.3);color:#fff;}
.opt .opt-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.opt:hover:not(:disabled) .opt-dot{border-color:rgba(78,161,255,.6);}
.opt.selected{background:rgba(78,161,255,.09);border:1.5px solid rgba(78,161,255,.45);color:#fff;}
.opt.selected .opt-dot{background:#4ea1ff;border-color:#4ea1ff;}
.opt.selected .opt-dot::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff;}
.opt:disabled{cursor:default;}

/* NAV ROW */
.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
.q-counter{font-size:.85rem;color:var(--muted);}
.btn-back{appearance:none;-webkit-appearance:none;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:10px 20px;font-size:.9rem;color:var(--muted);cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:.15s;}
.btn-back:hover{color:#fff;border-color:rgba(255,255,255,.25);}
.btn-next{appearance:none;-webkit-appearance:none;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:10px 20px;font-size:.9rem;font-weight:400;color:var(--muted);cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:.15s;}
.btn-next:hover:not(:disabled){color:#fff;border-color:rgba(255,255,255,.25);}
.btn-next:disabled{appearance:none;-webkit-appearance:none;background:transparent;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.08);cursor:default;}

/* RESULT */
.result-card{background:linear-gradient(180deg,rgba(14,27,48,.96),rgba(9,17,31,.9));border:1px solid rgba(43,64,98,.82);border-radius:22px;padding:28px;box-shadow:var(--shadow);}
.score-row{display:flex;align-items:center;gap:20px;margin-bottom:24px;}
.score-ring{
  width:88px;height:88px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
}
.score-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.score-ring .ring-bg{stroke:rgba(255,255,255,.07);fill:none;}
.score-ring .ring-fill{stroke:var(--green);fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.score-inner{position:relative;text-align:center;}
.score-num{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;color:#fff;line-height:1;}
.score-den{font-size:.72rem;color:var(--muted);}
.level-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:.75rem;font-weight:700;margin-bottom:8px;}
.lv-title{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;color:#fff;margin-bottom:6px;}
.lv-desc{font-size:.88rem;color:var(--muted);line-height:1.6;}

.role-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(78,161,255,.07);border:1px solid rgba(78,161,255,.15);border-radius:12px;margin-bottom:20px;font-size:.86rem;color:#8ec5ff;}
.role-banner svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}

.rec-label{font-size:.7rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.mod-list{display:flex;flex-direction:column;gap:7px;margin-bottom:24px;}
.mod-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:12px;transition:.15s;}
.mod-row.start-here{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.3);}
.mod-row:hover{background:rgba(255,255,255,.04);}
.mod-num{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif;}
.mod-info{flex:1;min-width:0;}
.mod-name{font-size:.9rem;color:#d6e1f0;font-weight:500;line-height:1.3;}
.mod-phase{font-size:.72rem;color:var(--muted);margin-top:2px;}
.mod-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.badge-start{background:rgba(34,197,94,.12);color:#4ade80;}
.badge-skip{background:rgba(255,255,255,.05);color:var(--muted);}

.action-row{display:flex;gap:10px;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff;border:none;border-radius:999px;padding:11px 24px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all .15s;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(34,197,94,.3);}
.btn-sec{background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:11px 24px;font-size:.9rem;color:var(--muted);cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:.15s;}
.btn-sec:hover{color:#fff;border-color:rgba(255,255,255,.25);}

.footer{border-top:1px solid rgba(34,54,85,.8);padding:28px 24px;text-align:center;color:var(--muted);font-size:.85rem;}
.footer a{color:var(--blue);}

@media(max-width:600px){
  .hero{padding:36px 16px 0;}
  .quiz-shell{padding:0 16px 48px;}
  .info-row{max-width:100%;}
  .score-row{flex-direction:column;text-align:center;}
  .action-row{flex-direction:column;}
  .btn-primary,.btn-sec{text-align:center;}
}
</style>
</head>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <div class="brand">
      <div class="brand-mark">AI</div>
      <span>The Take (AI)</span>
    </div>
    <a href="courses/ai-engineers/index.html" class="back-pill">

    </a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag"><span class="tag-dot"></span>Pre-Course Assessment</div>
  <h1>วัดระดับ<br><span>ก่อนเริ่มเรียน</span></h1>
  <p>ตอบ 10 ข้อ เพื่อดูว่าควรเริ่มจาก Module ไหน — ไม่มีผิดถูก ตอบตามความเป็นจริง ใช้เวลาประมาณ 4 นาที</p>
  <div class="info-row">
    <div class="info-item"><div class="info-n">10</div><div class="info-l">คำถาม</div></div>
    <div class="info-item"><div class="info-n">4</div><div class="info-l">นาที</div></div>
    <div class="info-item"><div class="info-n">4</div><div class="info-l">ระดับ</div></div>
  </div>
</div>

<!-- QUIZ -->
<div class="quiz-shell" id="quiz"></div>

<div class="footer">
  <strong style="color:#fff">The Take (AI)</strong> · AI for Real Work ·
  <a href="index.html">กลับหน้าหลัก</a>
</div>

<script>
const qs = [
  {
    cat:"ความรู้ AI ทั่วไป",
    q:"ท่านเคยใช้ AI tool เช่น ChatGPT, Copilot หรือ Gemini ในงานหรือไม่?",
    opts:["ไม่เคยใช้เลย","เคยลองบ้าง แต่ไม่แน่ใจว่าใช้ถูกวิธี","ใช้เป็นบางครั้งในงาน","ใช้เป็นประจำทุกวัน"],
    score:[0,1,2,3]
  },
  {
    cat:"ความเข้าใจ AI",
    q:"LLM (Large Language Model) คืออะไร?",
    opts:[
      "ระบบค้นหาข้อมูลบนอินเทอร์เน็ตขนาดใหญ่",
      "โมเดล AI ที่เรียนรู้จากข้อมูลข้อความจำนวนมหาศาล และสร้างภาษาได้",
      "ซอฟต์แวร์แปลภาษาอัตโนมัติ",
      "ฐานข้อมูลที่รวบรวมความรู้ทุกสาขา"
    ],
    score:[0,3,0,0]
  },
  {
    cat:"Prompt Basics",
    q:"ถ้าต้องการให้ AI สรุปรายงาน downtime ของโรงงาน ท่านจะเขียน prompt อย่างไร?",
    opts:[
      '"สรุปรายงาน"',
      '"ช่วยสรุปรายงาน downtime ให้หน่อย"',
      '"สรุปรายงาน downtime เดือนมีนาคม เป็น 3 bullet points ภาษาทางการ"',
      '"คุณคือ Production Engineer สรุปรายงาน downtime เดือนมีนาคม ที่เพิ่มขึ้น 15% เป็น bullet 3 ข้อ ภาษาทางการ ระบุสาเหตุหลักและ action"'
    ],
    score:[0,1,2,3]
  },
  {
    cat:"Prompt Framework",
    q:"RTF Framework ย่อมาจากอะไร?",
    opts:["Request, Task, File","Role, Task, Format","Result, Template, Flow","Reason, Target, Feedback"],
    score:[0,3,0,0]
  },
  {
    cat:"Prompt Framework",
    q:"ท่านต้องการวางแผนลด Downtime จาก 15% เหลือ 5% — ควรใช้ Framework ใด?",
    opts:[
      "RTF — เพราะต้องการ output เป็นตาราง",
      "BAB (Before-After-Bridge) — เพราะอธิบายสถานการณ์ปัจจุบัน เป้าหมาย และแนวทาง",
      "TAG — เพราะมีแค่ task เดียว",
      "ไม่จำเป็นต้องใช้ framework ใด ๆ"
    ],
    score:[0,3,0,0]
  },
  {
    cat:"Microsoft 365 Copilot",
    q:"ท่านรู้จัก AI tool ใดบ้างสำหรับงานเอกสารใน Microsoft 365?",
    opts:[
      "ไม่รู้จัก tool ในกลุ่มนี้เลย",
      "รู้จัก Copilot แต่ยังไม่เคยใช้",
      "เคยใช้ Copilot Chat ผ่านเว็บ",
      "ใช้ Copilot ใน Word, Excel หรือ Teams แล้ว"
    ],
    score:[0,1,2,3]
  },
  {
    cat:"Intermediate Technique",
    q:"\"Few-Shot Prompting\" คืออะไร?",
    opts:[
      "การใช้ prompt สั้น ๆ เพื่อประหยัดเวลา",
      "การให้ตัวอย่าง input-output ก่อนถาม เพื่อให้ AI ทำตามรูปแบบ",
      "การถาม AI หลาย ๆ ครั้งเพื่อเปรียบเทียบคำตอบ",
      "เทคนิคการแบ่ง prompt ยาว ๆ ออกเป็นส่วนย่อย"
    ],
    score:[0,3,0,0]
  },
  {
    cat:"งานโรงงาน + AI",
    q:"ท่านเคยใช้ AI ช่วยงานในโรงงานจริง ๆ ไหม? เช่น เขียนรายงาน, วิเคราะห์ข้อมูล, ร่าง SOP",
    opts:[
      "ไม่เคยเลย",
      "คิดอยู่ว่าน่าจะลองใช้ แต่ยังไม่ได้ลอง",
      "เคยลองใช้ แต่ผลลัพธ์ยังไม่ค่อยดี",
      "ใช้อยู่แล้วและได้ผลดี"
    ],
    score:[0,1,2,3]
  },
  {
    cat:"AI Safety",
    q:"ข้อมูลใดที่ควรระวัง ไม่ควร input ใน public AI เช่น ChatGPT?",
    opts:[
      "อุณหภูมิห้อง Kiln ทั่วไป",
      "สูตรการผลิตและ mix design ของบริษัท",
      "คำถามเกี่ยวกับ cement chemistry ทั่วไป",
      "ตัวอย่าง SOP format ที่ไม่มีข้อมูลจริง"
    ],
    score:[0,3,0,0]
  },
  {
    cat:"AI Hallucination",
    q:"AI ให้ค่า spec ของอุปกรณ์มาอย่างมั่นใจ ท่านควรทำอย่างไร?",
    opts:[
      "ใช้ค่านั้นได้เลย เพราะ AI ตอบมั่นใจ",
      "ตรวจสอบกับ manual หรือผู้เชี่ยวชาญก่อนนำไปใช้จริงเสมอ",
      "ถาม AI ซ้ำอีกครั้ง ถ้าตอบเหมือนเดิมแสดงว่าถูก",
      "AI ไม่มีทางให้ข้อมูลผิดถ้าเราถามถูกวิธี"
    ],
    score:[0,3,0,0]
  }
];

const levels = [
  {min:0,  max:8,  title:"Beginner",      label:"เริ่มต้นใหม่",    desc:"ยังไม่คุ้นเคยกับ AI มากนัก คอร์สนี้จะเริ่มจากพื้นฐานได้เลย ไม่ต้องมีความรู้ IT มาก่อน", start:1, col:"#3b82f6", bg:"rgba(59,130,246,.12)"},
  {min:9,  max:16, title:"Intermediate",  label:"มีพื้นฐานบ้าง",   desc:"รู้จัก AI และเคยลองใช้บ้าง แต่ยังไม่ได้ใช้อย่างมีระบบ สามารถข้าม Foundation บางส่วนได้", start:2, col:"#818cf8", bg:"rgba(99,102,241,.12)"},
  {min:17, max:22, title:"Advanced",      label:"พร้อม dive deep", desc:"ใช้ AI อยู่แล้วในงาน ข้าม Foundation ได้เลย เน้น Advanced techniques, Role-based prompts และ Capstone", start:5, col:"#f59e0b", bg:"rgba(245,158,11,.12)"},
  {min:23, max:27, title:"Expert",        label:"Expert Level",    desc:"มีความรู้ AI ดีมาก เน้น Module 05–07 เพื่อ deepen role-specific skills และสร้าง Prompt Library จริง", start:5, col:"#22c55e", bg:"rgba(34,197,94,.12)"}
];

const modules = [
  {num:"01", title:"AI คืออะไร และทำงานยังไง", phase:"Foundation", col:"#22c55e", bg:"rgba(34,197,94,.15)"},
  {num:"02", title:"Prompt Fundamentals", phase:"Foundation", col:"#22c55e", bg:"rgba(34,197,94,.15)"},
  {num:"03", title:"Intermediate Techniques", phase:"Intermediate", col:"#818cf8", bg:"rgba(99,102,241,.14)"},
  {num:"04", title:"AI สำหรับงานเอกสาร", phase:"Intermediate", col:"#818cf8", bg:"rgba(99,102,241,.14)"},
  {num:"05", title:"Role-based Application", phase:"Advanced", col:"#f59e0b", bg:"rgba(245,158,11,.14)"},
  {num:"06", title:"AI Safety & Privacy", phase:"Advanced", col:"#f59e0b", bg:"rgba(245,158,11,.14)"},
  {num:"07", title:"Capstone: Build Your Workflow", phase:"Capstone", col:"#38bdf8", bg:"rgba(56,189,248,.12)"},
];

const roleNames = ["Process/Production Engineer","Quality Control Engineer","Maintenance Engineer","Planning / Manager / Supervisor"];

let cur = 0, answers = [], sel = null;

function maxScore(){ return qs.reduce((s,q)=>s+Math.max(...q.score),0); }
function totalScore(){ return answers.reduce((s,a,i)=>s+qs[i].score[a],0); }
function getLevel(sc){ return levels.find(l=>sc>=l.min&&sc<=l.max)||levels[0]; }

function render(){
  const el = document.getElementById('quiz');
  if(cur>=qs.length){ renderResult(el); return; }
  const q = qs[cur];
  const pct = Math.round((cur/qs.length)*100);
  el.innerHTML = `
    <div class="prog-wrap">
      <div class="prog-meta"><span>ข้อ ${cur+1} จาก ${qs.length}</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-cat">${q.cat}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o,i)=>{
          let cls='opt';
          if(sel===i) cls+=' selected';
          return `<button class="${cls}" onclick="pick(${i})">
            <span class="opt-dot"></span>
            <span>${o}</span>
          </button>`;
        }).join('')}
      </div>
      <div class="q-nav">
        <button class="btn-back" onclick="back()" ${cur===0?'style="visibility:hidden"':''}>
          ← ย้อนกลับ
        </button>
        <button class="btn-next" onclick="next()" ${sel===null?'disabled':''}>
          ${cur<qs.length-1?'ถัดไป →':'ดูผลลัพธ์ →'}
        </button>
      </div>
    </div>`;
}

function renderResult(el){
  const sc = totalScore();
  const mx = maxScore();
  const lv = getLevel(sc);
  const startIdx = lv.start - 1;
  const pct = Math.round((sc/mx)*100);
  const r = 36, circ = 2*Math.PI*r;
  const dash = circ * pct/100;
  const roleIdx = answers[7];
  const roleName = roleIdx!==undefined ? roleNames[roleIdx] : null;

  const modRows = modules.map((m,i)=>{
    const isStart = i===startIdx;
    const isSkip = i<startIdx;
    return `<div class="mod-row${isStart?' start-here':''}">
      <div class="mod-num" style="background:${m.bg};color:${m.col}">M${m.num}</div>
      <div class="mod-info">
        <div class="mod-name">${m.title}</div>
        <div class="mod-phase">${m.phase}</div>
      </div>
      ${isStart?'<span class="mod-badge badge-start">เริ่มที่นี่ →</span>':isSkip?'<span class="mod-badge badge-skip">ข้ามได้</span>':''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="result-card">
      <div class="score-row">
        <div class="score-ring">
          <svg viewBox="0 0 88 88" width="88" height="88">
            <circle class="ring-bg" cx="44" cy="44" r="${r}" stroke-width="5"/>
            <circle class="ring-fill" cx="44" cy="44" r="${r}" stroke-width="5"
              stroke-dasharray="${dash} ${circ}" stroke-dashoffset="0"/>
          </svg>
          <div class="score-inner">
            <div class="score-num">${sc}</div>
            <div class="score-den">/${mx}</div>
          </div>
        </div>
        <div>
          <div class="level-badge" style="background:${lv.bg};color:${lv.col}">
            ${lv.title} — ${lv.label}
          </div>
          <div class="lv-desc">${lv.desc}</div>
        </div>
      </div>
      ${roleName?`<div class="role-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>แผนกของท่าน: <strong>${roleName}</strong> — เน้น use cases ใน M05 ได้เลย</span>
      </div>`:''}
      <div class="rec-label">Learning Path แนะนำสำหรับท่าน</div>
      <div class="mod-list">${modRows}</div>
      <div class="action-row">
        <a href="courses/ai-engineers/m0${lv.start}.html" class="btn-primary">เริ่ม Module ${lv.start} เลย →</a>
        <button class="btn-sec" onclick="restart()">ทำแบบทดสอบใหม่</button>
      </div>
    </div>`;

  setTimeout(()=>{
    const fill=el.querySelector('.ring-fill');
    if(fill) fill.style.strokeDasharray=`${dash} ${circ}`;
  },100);
}

function pick(i){ sel=i; render(); }
function next(){ if(sel===null)return; answers.push(sel); cur++; sel=null; render(); }
function back(){ if(cur===0)return; cur--; sel=answers.pop(); render(); }
function restart(){ cur=0; answers=[]; sel=null; render(); }

render();
</script>
</body>
</html>
